<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>csgohack1.ru</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── DARK THEME (default) ── */
    :root {
      --bg:       #080a0f;
      --bg2:      #0d1017;
      --surface:  rgba(255,255,255,0.03);
      --border:   rgba(0,255,231,0.18);
      --accent:   #00ffe7;
      --accent2:  #00b8ff;
      --text:     #e8f4f0;
      --muted:    rgba(255,255,255,0.18);
      --particle: 0,255,231;
      --sep:      rgba(0,255,231,0.22);
      --prog-bg:  rgba(0,255,231,0.08);
      --scanline: rgba(0,0,0,0.07);
      --noise-op: 0.6;
      --orb:      rgba(0,255,231,0.07);
      --glow-num: rgba(0,255,231,0.35);
    }

    /* ── LIGHT THEME ── */
    [data-theme="light"] {
      --bg:       #f0f4f8;
      --bg2:      #e6ecf2;
      --surface:  rgba(0,0,0,0.03);
      --border:   rgba(0,140,130,0.25);
      --accent:   #007a70;
      --accent2:  #005fa3;
      --text:     #0d1a1a;
      --muted:    rgba(0,0,0,0.3);
      --particle: 0,120,110;
      --sep:      rgba(0,120,110,0.3);
      --prog-bg:  rgba(0,120,110,0.1);
      --scanline: rgba(0,0,0,0.03);
      --noise-op: 0.25;
      --orb:      rgba(0,160,150,0.08);
      --glow-num: rgba(0,120,110,0.2);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
      transition: background 0.4s, color 0.4s;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
      z-index: 100;
      opacity: var(--noise-op);
      transition: opacity 0.4s;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scanline) 2px,var(--scanline) 4px);
      pointer-events: none;
      z-index: 101;
    }

    canvas { position: fixed; inset: 0; z-index: 0; }

    /* ── THEME TOGGLE ── */
    .theme-toggle {
      position: fixed;
      top: 22px; right: 22px;
      z-index: 200;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 14px;
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
      transition: all 0.3s;
      backdrop-filter: blur(8px);
      user-select: none;
    }
    .theme-toggle:hover { color: var(--accent); border-color: var(--accent); }
    .theme-toggle svg { width: 13px; height: 13px; fill: currentColor; }

    /* ── HERO ── */
    .hero {
      position: relative;
      height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 5;
    }

    .orb {
      position: absolute;
      width: 440px; height: 440px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, var(--orb) 0%, transparent 70%);
      filter: blur(40px);
      animation: pulse 4s ease-in-out infinite;
      pointer-events: none;
      transition: background 0.4s;
    }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:.85} 50%{transform:scale(1.1);opacity:1} }

    .date-wrap { position: relative; text-align: center; }
    .date-wrap::before {
      content: ''; display: block;
      width: 1px; height: 60px;
      background: linear-gradient(to bottom, transparent, var(--accent));
      margin: 0 auto 28px; opacity: 0;
      animation: fadeUp 1s 0.3s forwards;
    }
    .date {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 10vw, 110px);
      letter-spacing: 0.08em;
      color: var(--text);
      text-shadow: 0 0 30px var(--glow-num), 0 0 80px transparent;
      opacity: 0;
      animation: fadeUp 0.9s 0.5s cubic-bezier(0.16,1,0.3,1) forwards, flicker 8s 2s infinite;
      transition: color 0.4s, text-shadow 0.4s;
    }
    .soon {
      display: block;
      font-size: clamp(13px, 2vw, 17px);
      letter-spacing: 0.5em;
      color: var(--accent);
      text-transform: uppercase;
      margin-top: 10px; opacity: 0;
      animation: fadeUp 0.9s 0.9s cubic-bezier(0.16,1,0.3,1) forwards;
      transition: color 0.4s;
    }
    .date-wrap::after {
      content: ''; display: block;
      width: 1px; height: 60px;
      background: linear-gradient(to top, transparent, var(--accent));
      margin: 28px auto 0; opacity: 0;
      animation: fadeUp 1s 1.1s forwards;
    }

    @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    @keyframes flicker { 0%,94%,96%,98%,100%{opacity:1} 95%,97%{opacity:.85} }

    .scroll-hint {
      position: absolute;
      bottom: 32px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      opacity: 0;
      animation: fadeUp 1s 1.6s forwards;
      cursor: pointer;
    }
    .scroll-hint span { font-size: 10px; letter-spacing: 0.35em; color: var(--muted); text-transform: uppercase; transition: color 0.4s; }
    .scroll-arrow {
      width: 14px; height: 14px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      transform: rotate(45deg);
      animation: arrowBounce 1.5s ease-in-out infinite;
      transition: border-color 0.4s;
    }
    @keyframes arrowBounce { 0%,100%{transform:rotate(45deg) translateY(0)} 50%{transform:rotate(45deg) translateY(5px)} }

    /* ── COUNTDOWN ── */
    .countdown-section {
      position: relative;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 5;
      padding: 60px 20px 80px;
    }

    .section-label {
      font-size: 11px; letter-spacing: 0.45em;
      color: var(--accent); text-transform: uppercase;
      margin-bottom: 56px; opacity: 0.65;
      transition: color 0.4s;
    }

    .countdown-grid {
      display: flex;
      gap: clamp(10px, 3vw, 40px);
      align-items: flex-start;
    }

    .cd-item { display: flex; flex-direction: column; align-items: center; gap: 12px; }

    .cd-box {
      position: relative;
      width: clamp(76px, 17vw, 140px);
      height: clamp(76px, 17vw, 140px);
      display: flex; align-items: center; justify-content: center;
      background: var(--surface);
      transition: background 0.4s;
    }
    .cd-box::before {
      content: ''; position: absolute; inset: 0;
      border: 1px solid var(--border);
      transition: border-color 0.4s;
    }
    .cd-box::after {
      content: ''; position: absolute; inset: -1px;
      border: 1px solid transparent;
      border-top-color: var(--accent);
      border-right-color: var(--accent);
      opacity: 0.45;
      animation: rotateBorder 3s linear infinite;
      transition: border-color 0.4s;
    }
    @keyframes rotateBorder { to{ transform: rotate(360deg); } }

    .cd-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(34px, 8.5vw, 76px);
      line-height: 1;
      color: var(--text);
      text-shadow: 0 0 16px var(--glow-num);
      position: relative; z-index: 1;
      transition: color 0.4s, text-shadow 0.4s;
    }
    .cd-num.tick { animation: numTick 0.35s ease; }
    @keyframes numTick { 0%{transform:scale(1.18);color:var(--accent)} 100%{transform:scale(1)} }

    .cd-label { font-size: 10px; letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase; transition: color 0.4s; }

    .cd-sep {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(38px, 8.5vw, 76px);
      color: var(--sep);
      margin-top: clamp(19px, 4vw, 32px);
      animation: blink 1s step-end infinite;
      transition: color 0.4s;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .progress-wrap {
      margin-top: 64px;
      width: min(520px, 90vw);
      display: flex; flex-direction: column; gap: 10px;
    }
    .progress-labels {
      display: flex; justify-content: space-between;
      font-size: 10px; letter-spacing: 0.2em; color: var(--muted);
      transition: color 0.4s;
    }
    .progress-track {
      height: 2px;
      background: var(--prog-bg);
      position: relative;
      transition: background 0.4s;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(to right, var(--accent2), var(--accent));
      box-shadow: 0 0 8px var(--accent);
      transition: width 1s linear, background 0.4s, box-shadow 0.4s;
      width: 0%;
    }
    .progress-pct { text-align: right; font-size: 11px; color: var(--accent); letter-spacing: 0.2em; transition: color 0.4s; }

    /* ── TELEGRAM ── */
    .tg-section {
      position: relative;
      height: 55vh; min-height: 280px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 5; gap: 28px; padding: 20px;
    }
    .tg-hint { font-size: 11px; letter-spacing: 0.4em; color: var(--muted); text-transform: uppercase; transition: color 0.4s; }
    .tg-btn {
      display: flex; align-items: center; gap: 14px;
      padding: 18px 44px;
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(14px, 3vw, 18px);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      position: relative;
      transition: all 0.35s;
      overflow: hidden;
      background: var(--surface);
    }
    .tg-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,255,231,0.04), rgba(0,184,255,0.04));
      opacity: 0; transition: opacity 0.35s;
    }
    .tg-btn::after {
      content: ''; position: absolute;
      bottom: 0; left: -100%;
      width: 100%; height: 1px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
      transition: left 0.45s ease;
    }
    .tg-btn:hover::before { opacity: 1; }
    .tg-btn:hover::after  { left: 100%; }
    .tg-btn:hover { border-color: var(--accent); box-shadow: 0 0 28px rgba(0,255,231,0.1); color: var(--accent); }
    .tg-btn .tg-icon { fill: var(--accent); transition: fill 0.4s; }

    /* corners */
    .corner { position: fixed; width: 38px; height: 38px; opacity: 0.2; z-index: 6; pointer-events: none; transition: opacity 0.4s; }
    .corner::before,.corner::after{content:'';position:absolute;background:var(--accent);transition:background 0.4s;}
    .corner::before{width:100%;height:1px;}
    .corner::after{width:1px;height:100%;}
    .corner.tl{top:24px;left:24px}
    .corner.tr{top:24px;right:24px;transform:scaleX(-1)}
    .corner.bl{bottom:24px;left:24px;transform:scaleY(-1)}
    .corner.br{bottom:24px;right:24px;transform:scale(-1)}

    .copyright {
      position: relative; text-align: center;
      padding: 18px; font-size: 10px;
      letter-spacing: 0.15em; color: var(--muted);
      z-index: 5; user-select: none; transition: color 0.4s;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<!-- THEME TOGGLE -->
<button class="theme-toggle" id="themeBtn" aria-label="Toggle theme">
  <svg id="themeIcon" viewBox="0 0 24 24">
    <!-- icon injected by JS -->
  </svg>
  <span id="themeLabel">light</span>
</button>

<!-- HERO -->
<section class="hero">
  <div class="orb"></div>
  <div class="date-wrap">
    <div class="date">14.04.2026</div>
    <span class="soon">soon..</span>
  </div>
  <div class="scroll-hint" onclick="document.getElementById('countdown').scrollIntoView({behavior:'smooth'})">
    <span>scroll</span>
    <div class="scroll-arrow"></div>
  </div>
</section>

<!-- COUNTDOWN -->
<section class="countdown-section" id="countdown">
  <div class="section-label">— time until launch —</div>
  <div class="countdown-grid">
    <div class="cd-item">
      <div class="cd-box"><div class="cd-num" id="cd-d">00</div></div>
      <div class="cd-label">days</div>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-item">
      <div class="cd-box"><div class="cd-num" id="cd-h">00</div></div>
      <div class="cd-label">hours</div>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-item">
      <div class="cd-box"><div class="cd-num" id="cd-m">00</div></div>
      <div class="cd-label">minutes</div>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-item">
      <div class="cd-box"><div class="cd-num" id="cd-s">00</div></div>
      <div class="cd-label">seconds</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-labels">
      <span>countdown start</span>
      <span>14.04.2026</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill"></div>
    </div>
    <div class="progress-pct" id="prog-pct">0.00%</div>
  </div>
</section>

<!-- TELEGRAM -->
<section class="tg-section">
  <div class="tg-hint">stay updated</div>
  <a href="https://t.me/csgohack1" target="_blank" class="tg-btn">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path class="tg-icon" d="M21.05 3.17L2.29 10.45c-1.3.52-1.29 1.25-.24 1.57l4.8 1.5 11.11-7.02c.52-.32 1-.15.61.2L9.5 15.06l-.36 5.1c.52 0 .75-.24 1.04-.51l2.5-2.43 5.2 3.84c.96.53 1.65.26 1.89-.89l3.42-16.1c.35-1.38-.53-2.01-1.14-1.9z"/>
    </svg>
    Telegram
  </a>
</section>

<p class="copyright">&copy; 2026 csgohack1.ru</p>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<script>
/* ── THEME ── */
const MOON = `<path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" stroke="currentColor" stroke-width="1.5" fill="none"/>`;
const SUN  = `<path d="M12 4V2M12 22v-2M4 12H2M22 12h-2M6.34 6.34 4.93 4.93M19.07 19.07l-1.41-1.41M17.66 6.34l1.41-1.41M4.93 19.07l1.41-1.41M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>`;

const html      = document.documentElement;
const themeBtn  = document.getElementById('themeBtn');
const themeIcon = document.getElementById('themeIcon');
const themeLabel= document.getElementById('themeLabel');

function applyTheme(theme) {
  html.setAttribute('data-theme', theme);
  const isDark = theme === 'dark';
  themeIcon.innerHTML    = isDark ? SUN  : MOON;
  themeLabel.textContent = isDark ? 'light' : 'dark';
  localStorage.setItem('theme', theme);
}

// Detect system preference
const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
const saved = localStorage.getItem('theme');
applyTheme(saved || (prefersDark ? 'dark' : 'light'));

themeBtn.addEventListener('click', () => {
  applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});

// Sync if system changes
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
  if (!localStorage.getItem('theme')) applyTheme(e.matches ? 'dark' : 'light');
});

/* ── PARTICLES ── */
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, pts = [];
const N = 60;

function getParticleColor() {
  return html.getAttribute('data-theme') === 'light' ? '0,120,110' : '0,255,231';
}

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

function initP() {
  pts = [];
  for (let i = 0; i < N; i++)
    pts.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.2+.3, vx:(Math.random()-.5)*.28, vy:(Math.random()-.5)*.28, a: Math.random()*.45+.08 });
}

function drawP() {
  ctx.clearRect(0, 0, W, H);
  const pc = getParticleColor();
  for (let i = 0; i < N; i++) for (let j = i+1; j < N; j++) {
    const dx = pts[i].x-pts[j].x, dy = pts[i].y-pts[j].y, d = Math.sqrt(dx*dx+dy*dy);
    if (d < 140) {
      ctx.beginPath();
      ctx.moveTo(pts[i].x, pts[i].y);
      ctx.lineTo(pts[j].x, pts[j].y);
      ctx.strokeStyle = `rgba(${pc},${.06*(1-d/140)})`;
      ctx.lineWidth = .5; ctx.stroke();
    }
  }
  for (const p of pts) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${pc},${p.a})`;
    ctx.fill();
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0 || p.x > W) p.vx *= -1;
    if (p.y < 0 || p.y > H) p.vy *= -1;
  }
  requestAnimationFrame(drawP);
}

window.addEventListener('resize', () => { resize(); initP(); });
resize(); initP(); drawP();

/* ── COUNTDOWN ── */
const TARGET = new Date('2026-04-14T00:00:00');
const START  = new Date('2026-04-06T00:00:00');
const TOTAL  = TARGET - START;

const elD  = document.getElementById('cd-d');
const elH  = document.getElementById('cd-h');
const elM  = document.getElementById('cd-m');
const elS  = document.getElementById('cd-s');
const fill = document.getElementById('prog-fill');
const pct  = document.getElementById('prog-pct');

function pad(n) { return String(Math.max(0,n)).padStart(2,'0'); }
function tick(el, val) {
  const s = pad(val);
  if (el.textContent !== s) {
    el.classList.remove('tick');
    void el.offsetWidth;
    el.classList.add('tick');
    el.textContent = s;
  }
}

function update() {
  const now  = new Date();
  const diff = Math.max(0, TARGET - now);
  const ela  = Math.max(0, now - START);
  const p    = Math.min(100, (ela / TOTAL) * 100);

  tick(elD, Math.floor(diff / 86400000));
  tick(elH, Math.floor((diff % 86400000) / 3600000));
  tick(elM, Math.floor((diff % 3600000)  / 60000));
  tick(elS, Math.floor((diff % 60000)    / 1000));

  fill.style.width   = p.toFixed(4) + '%';
  pct.textContent    = p.toFixed(2) + '%';
}

update();
setInterval(update, 1000);
</script>
</body>
</html>
